<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 - 아무 말 대잔치</title>
  <link rel="stylesheet" href="../../shared/css/common.css" />
  <link rel="stylesheet" href="signup.css" />
</head>
<body>
  <header class="app-header app-header--with-back">
    <button class="app-header__back" type="button" id="back-button" aria-label="뒤로가기">
      &lt;
    </button>
    <h1 class="app-header__title">아무 말 대잔치</h1>
  </header>

  <main class="auth-main">
    <section class="auth-card">
      <h2 class="auth-card__title">회원가입</h2>

      <!-- POST /auth/sign-up 으로 보낼 폼 -->
      <form class="auth-form" id="signup-form" novalidate>
        <!-- 프로필 사진 (서버 키: profileImageUrl, 필수) -->
        <div class="profile-field">
          <span class="field__label">프로필 사진 *</span>
          <p class="field__helper" id="profileImageUrl-helper" data-field="profileImageUrl">
            프로필 사진을 추가해주세요.
          </p>

          <label class="profile-uploader" for="profile-image">
            <span class="profile-uploader__placeholder" id="profile-preview">+</span>
            <input
              class="profile-uploader__input"
              type="file"
              id="profile-image"
              name="profileImageUrl"
              accept="image/*"
            />
          </label>
        </div>

        <!-- 이메일 (서버 키: email) -->
        <div class="field">
          <label class="field__label" for="email">이메일 *</label>
          <input
            class="field__input"
            type="email"
            id="email"
            name="email"
            placeholder="이메일을 입력하세요"
            autocomplete="email"
          />
          <p class="field__helper" id="email-helper" data-field="email">
            올바른 이메일 주소 형식을 입력해주세요.
          </p>
        </div>

        <!-- 비밀번호 (서버 키: password) -->
        <div class="field">
          <label class="field__label" for="password">비밀번호 *</label>
          <input
            class="field__input"
            type="password"
            id="password"
            name="password"
            placeholder="비밀번호를 입력하세요"
            autocomplete="new-password"
          />
          <p class="field__helper" id="password-helper" data-field="password">
            8자 이상 20자 이하, 대문자·소문자·숫자·특수문자를 각각 1개 이상 포함해주세요.
          </p>
        </div>

        <!-- 비밀번호 확인 (서버 키: checkPassword) -->
        <div class="field">
          <label class="field__label" for="check-password">비밀번호 확인 *</label>
          <input
            class="field__input"
            type="password"
            id="check-password"
            name="checkPassword"
            placeholder="비밀번호를 한번 더 입력하세요"
            autocomplete="new-password"
          />
          <p class="field__helper" id="checkPassword-helper" data-field="checkPassword">
            비밀번호를 한번 더 입력해주세요.
          </p>
        </div>

        <!-- 닉네임 (서버 키: nickname) -->
        <div class="field">
          <label class="field__label" for="nickname">닉네임 *</label>
          <input
            class="field__input"
            type="text"
            id="nickname"
            name="nickname"
            placeholder="닉네임을 입력하세요"
            autocomplete="nickname"
          />
          <p class="field__helper" id="nickname-helper" data-field="nickname">
            띄어쓰기 없이 10글자 이내로 입력해주세요.
          </p>
        </div>

        <!-- 필드에 속하지 않는 폼 전체 오류 표시 자리 (예: 예기치 못한 서버 오류) -->
        <p class="form-error" id="signup-form-error" role="alert"></p>

        <button class="btn-primary" type="submit" id="signup-submit" disabled>
          회원가입
        </button>
      </form>

      <a class="link-text" href="login.html">로그인하러 가기</a>
    </section>
  </main>

  <script src="signup.js"></script>
  <script src="../common.js"></script>
</body>
</html>
