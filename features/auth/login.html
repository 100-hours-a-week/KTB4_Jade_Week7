<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 - 아무 말 대잔치</title>
  <link rel="stylesheet" href="../../shared/css/common.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <header class="app-header">
    <h1 class="app-header__title">아무 말 대잔치</h1>
  </header>

  <main class="auth-main">
    <section class="auth-card">
      <h2 class="auth-card__title">로그인</h2>

      <!-- POST /auth/sign-in 으로 보낼 폼 -->
      <form class="auth-form" id="login-form" novalidate>
        <!-- 이메일 (서버 키: email) -->
        <div class="field">
          <label class="field__label" for="email">이메일</label>
          <input
            class="field__input"
            type="email"
            id="email"
            name="email"
            placeholder="이메일을 입력하세요"
            autocomplete="email"
          />
          <p class="field__helper" id="email-helper" data-field="email"></p>
        </div>

        <!-- 비밀번호 (서버 키: password) -->
        <div class="field">
          <label class="field__label" for="password">비밀번호</label>
          <input
            class="field__input"
            type="password"
            id="password"
            name="password"
            placeholder="비밀번호를 입력하세요"
            autocomplete="current-password"
          />
          <p class="field__helper" id="password-helper" data-field="password"></p>
        </div>

        <!-- 401 응답("이메일 또는 비밀번호가 다릅니다") 등
             특정 필드에 속하지 않는 폼 전체 오류 표시 자리 -->
        <p class="form-error" id="login-form-error" role="alert"></p>

        <button class="btn-primary" type="submit" id="login-submit" disabled>
          로그인
        </button>
      </form>

      <a class="link-text" href="signup.html">회원가입</a>
    </section>
  </main>

  <script src="login.js"></script>
  <script src="../common.js"></script>
</body>
</html>
