<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아무 말 대잔치 - 비밀번호 수정</title>
  <link rel="stylesheet" href="/shared/css/common.css" />
  <link rel="stylesheet" href="./mypage.css" />
</head>

<body class="mypage-page">

  <!-- 공통 헤더는 common.js 가 이 자리에 주입한다 (뒤로가기 없음) -->
  <div id="app-header"></div>

  <!-- 비밀번호 수정 폼 -->
  <main class="member-edit-main">
    <h1 class="member-edit-title">비밀번호 수정</h1>

    <p class="member-edit-request-message" id="requestMessage" role="alert" hidden></p>

    <form class="member-edit-form" id="passwordForm" novalidate>

      <div class="member-form-field" id="passwordField">
        <label class="member-form-label" for="passwordInput">비밀번호</label>
        <input
          type="password"
          class="member-form-input"
          id="passwordInput"
          name="password"
          placeholder="비밀번호를 입력하세요"
          autocomplete="new-password"
        />
        <p class="member-form-message" id="passwordMessage">* helper text</p>
      </div>

      <div class="member-form-field" id="checkPasswordField">
        <label class="member-form-label" for="checkPasswordInput">비밀번호 확인</label>
        <input
          type="password"
          class="member-form-input"
          id="checkPasswordInput"
          name="checkPassword"
          placeholder="비밀번호를 한번 더 입력하세요"
          autocomplete="new-password"
        />
        <p class="member-form-message" id="checkPasswordMessage">* helper text</p>
      </div>

      <button type="submit" class="member-submit-button" id="submitButton">수정하기</button>
    </form>
  </main>

  <script src="/features/common.js" defer></script>
  <script src="./password-edit.js" defer></script>
</body>
</html>
