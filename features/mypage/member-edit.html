<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아무 말 대잔치 - 회원정보수정</title>
  <link rel="stylesheet" href="./mypage.css" />
  <link rel="stylesheet" href="/shared/css/common.css" />
</head>

<body class="mypage-page">

  <!-- 공통 헤더는 common.js 가 이 자리에 주입한다 (뒤로가기 없음) -->
  <div id="app-header"></div>

  <!-- 회원정보수정 폼 -->
  <main class="member-edit-main">
    <h1 class="member-edit-title">회원정보수정</h1>

    <p class="member-edit-request-message" id="requestMessage" role="alert" hidden></p>

    <form class="member-edit-form" id="editForm" novalidate>

      <!-- 프로필 사진 (조회 이미지 + 변경 버튼) -->
      <div class="member-profile-field">
        <label class="member-form-label">프로필 사진*</label>
        <div class="member-profile-field__image-wrap">
          <span class="member-profile-field__image" id="profilePreview" role="img" aria-label="프로필 사진"></span>
          <input type="file" class="member-profile-field__input" id="profileInput" accept="image/*" />
          <label class="member-profile-field__change" for="profileInput">변경</label>
        </div>
      </div>

      <!-- 이메일 (수정 불가, 표시만) -->
      <div class="member-form-field">
        <label class="member-form-label">이메일</label>
        <p class="member-form-static" id="emailText">이메일을 불러오는 중...</p>
      </div>

      <!-- 닉네임 (수정 가능) -->
      <div class="member-form-field" id="nicknameField">
        <label class="member-form-label" for="nicknameInput">닉네임</label>
        <input
          type="text"
          class="member-form-input"
          id="nicknameInput"
          name="nickname"
          placeholder="닉네임을 입력해주세요."
          maxlength="10"
          autocomplete="off"
        />
        <p class="member-form-message" id="nicknameMessage">* helper text</p>
      </div>

      <button type="submit" class="member-submit-button" id="submitButton">수정하기</button>
      <button type="button" class="member-withdraw-button" id="withdrawButton">회원 탈퇴</button>
    </form>
  </main>

  <!-- 회원탈퇴 확인 모달 (초기 숨김) -->
  <div class="app-modal" id="withdrawModal" role="dialog" aria-modal="true" aria-labelledby="withdrawModalTitle" aria-hidden="true">
    <div class="app-modal__overlay" data-modal-close></div>
    <div class="app-modal__dialog">
      <h2 class="app-modal__title" id="withdrawModalTitle">회원탈퇴 하시겠습니까?</h2>
      <p class="app-modal__description">작성된 게시글과 댓글은 삭제됩니다.</p>
      <div class="app-modal__actions">
        <button type="button" class="app-modal__button--cancel" data-modal-close>취소</button>
        <button type="button" class="app-modal__button--confirm" id="withdrawConfirmButton">확인</button>
      </div>
    </div>
  </div>

  <script src="/features/common.js" defer></script>
  <script src="./member-edit.js" defer></script>
</body>
</html>
