<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아무 말 대잔치 - 게시글 작성</title>
  <link rel="stylesheet" href="./articles.css" />
  <link rel="stylesheet" href="/shared/css/common.css" />
</head>

<body class="articles-page">

  <!-- 공통 헤더는 common.js 가 이 자리에 주입한다 (뒤로가기 있음) -->
  <div id="app-header" data-back="true"></div>

  <!-- 게시글 작성 폼 -->
  <main class="article-create-main">
    <h1 class="article-create-title">게시글 작성</h1>

    <!-- 전역 오류 메시지 (로그인 필요 / 서버 일반 오류). 평소 숨김 -->
    <p class="article-create-request-message" id="requestMessage" role="alert" hidden></p>

    <!-- novalidate: 브라우저 기본 검증 대신 JS 로 직접 검증 -->
    <form class="article-create-form" id="createForm" novalidate>

      <!-- 제목 -->
      <div class="article-form-field" id="titleField">
        <label class="article-form-label" for="titleInput">제목*</label>
        <input
          type="text"
          class="article-form-input"
          id="titleInput"
          name="title"
          placeholder="제목을 입력해주세요. (최대 26글자)"
          maxlength="26"
          autocomplete="off"
        />
        <p class="article-form-message" id="titleMessage"></p>
      </div>

      <!-- 내용 -->
      <div class="article-form-field" id="contentField">
        <label class="article-form-label" for="contentInput">내용*</label>
        <textarea
          class="article-form-input article-form-textarea"
          id="contentInput"
          name="content"
          placeholder="내용을 입력해주세요."
          rows="8"
        ></textarea>
        <p class="article-form-message" id="contentMessage">* helper text</p>
      </div>

      <!-- 이미지 (파일 선택 + 파일명 표시) -->
      <div class="article-image-field" id="imageField">
        <label class="article-form-label" for="imageInput">이미지</label>
        <div class="article-image-field__row">
          <input type="file" class="article-image-field__input" id="imageInput" accept="image/*" />
          <label class="article-image-field__button" for="imageInput">파일 선택</label>
          <span class="article-image-field__name" id="imageFileName">파일을 선택해주세요.</span>
        </div>
        <p class="article-form-message" id="imageMessage"></p>
      </div>

      <!-- 완료 버튼: 제목·내용 유효할 때만 활성. 기본 비활성 -->
      <button type="submit" class="article-submit-button" id="submitButton" disabled>완료</button>
    </form>
  </main>

  <script src="/features/common.js" defer></script>
  <script src="./article-create.js" defer></script>
</body>
</html>
